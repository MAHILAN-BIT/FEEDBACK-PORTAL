<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Details | Industry Feedback</title>
    <link rel="stylesheet" href="sty.css">
</head>

<body class="has-navbar">

    <!-- SHARED NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand" onclick="window.location.href='dash.html'">Industry Portal</div>
        <div class="nav-links">
            <a href="dash.html" class="nav-link">Dashboard</a>
            <a href="ind.html" id="navSurvey" class="nav-link">Survey</a>
            <button onclick="logout()" class="danger logout-btn">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2 id="title">Institution Feedback</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 32px;">Detailed industry responses</p>

        <div id="surveyList"></div>

        <button onclick="window.location.href='dash.html'" class="link-btn" style="margin-top: 24px;">
            ← Back to Dashboard
        </button>
    </div>

    <script>
        // ✅ LOGIN CHECK
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "log.html";
        }

        // Role-based survey link visibility
        if (localStorage.getItem("role") === "industry") {
            document.getElementById("navSurvey").style.display = "block";
        } else {
            document.getElementById("navSurvey").style.display = "none";
        }

        let college = localStorage.getItem("selectedCollege");
        let title = document.getElementById("title");
        let div = document.getElementById("surveyList");

        function convertToScore(answer) {
            answer = answer.toLowerCase();
            if (answer.includes("excellent") || answer.includes("highly")) return 5;
            if (answer.includes("very") || answer.includes("good")) return 4;
            if (answer.includes("moderate") || answer.includes("professional")) return 3;
            if (answer.includes("basic") || answer.includes("satisfactory")) return 2;
            return 1;
        }

        async function loadSurveys() {
            if (!college) {
                title.innerText = "Selection Error";
                div.innerHTML = "<p style='text-align:center'>Please go back and select a college.</p>";
                return;
            }

            title.innerText = college;

            try {
                const response = await fetch(`/api/surveys?college=${encodeURIComponent(college)}`);
                const filtered = await response.json();

                if (filtered.length === 0) {
                    div.innerHTML = `
                        <div style="text-align:center; padding: 40px 0;">
                            <p style="color: var(--text-muted);">No responses recorded for this institution yet.</p>
                        </div>`;
                } else {
                    div.innerHTML = "";
                    filtered.forEach((s, index) => {
                        let s1Val = (convertToScore(s.s1) / 5) * 100;
                        let s2Val = (convertToScore(s.s2) / 5) * 100;
                        let s3Val = (convertToScore(s.s3) / 5) * 100;

                        div.innerHTML += `
                            <div class="survey-box response-card">
                                <div class="response-header">
                                    <b>Response #${index + 1}</b>
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <span class="score-pill">⭐ ${Number(s.avg).toFixed(1)}</span>
                                        ${localStorage.getItem("role") === "industry" ?
                                `<button onclick="deleteSurvey('${s.id}')" class="danger" style="padding: 4px 8px; font-size: 12px; height: auto; width: auto; margin: 0;">Delete</button>` : ''}
                                    </div>
                                </div>
                                <div style="font-size: 13px; color: var(--primary); font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                                    <span style="font-size: 16px;">👤</span> Responded by: ${s.username || 'Previous User'}
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Communication (${s.s1})</span>
                                    <div style="width: 100px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden;">
                                        <div style="width: ${s1Val}%; height: 100%; background: var(--primary);"></div>
                                    </div>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Technical (${s.s2})</span>
                                    <div style="width: 100px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden;">
                                        <div style="width: ${s2Val}%; height: 100%; background: var(--primary);"></div>
                                    </div>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Professionalism (${s.s3})</span>
                                    <div style="width: 100px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden;">
                                        <div style="width: ${s3Val}%; height: 100%; background: var(--primary);"></div>
                                    </div>
                                </div>
                                ${s.personalFeedback ? `
                                <div style="margin-top: 12px; padding: 10px; background: rgba(var(--primary-rgb), 0.05); border-left: 3px solid var(--primary); border-radius: 4px;">
                                    <p style="font-size: 13px; color: var(--text-main); margin: 0;">${s.personalFeedback}</p>
                                </div>` : ""}
                                ${s.date ? `<span class="date-tag">Submitted on ${s.date}</span>` : ""}
                            </div>`;
                    });
                }
            } catch (error) {
                console.error("Survey Load Error:", error);
                div.innerHTML = "<p style='text-align:center; color: var(--danger)'>Failed to load surveys</p>";
            }
        }

        async function deleteSurvey(id) {
            if (!confirm("Are you sure you want to delete this review?")) return;

            try {
                const response = await fetch(`/api/surveys/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    loadSurveys();
                } else {
                    alert("Failed to delete review");
                }
            } catch (error) {
                console.error("Delete Error:", error);
                alert("Server connection failed.");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "log.html";
        }

        loadSurveys();
    </script>

</body>

</html>
